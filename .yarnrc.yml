nodeLinker: node-modules

yarnPath: .yarn/releases/yarn-4.13.0.cjs

# Suppress false-positive peer warnings for packages whose optional peers are
# satisfied at the workspace level or shipped internally by another package.
packageExtensions:
  # vite-tsconfig-paths needs vite as a peer, but Vitest ships its own Vite
  # internally — no need to install vite separately.
  "vite-tsconfig-paths@*":
    peerDependenciesMeta:
      vite:
        optional: true
  # cosmiconfig-typescript-loader (pulled in by @commitlint/load) declares
  # @types/node and typescript as peers, but does not receive them from its
  # direct parent. Both are present at the workspace level and resolvable.
  "cosmiconfig-typescript-loader@*":
    peerDependenciesMeta:
      "@types/node":
        optional: true
      typescript:
        optional: true
