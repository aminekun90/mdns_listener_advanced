name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (e.g. 4.0.0) — leave empty to use package.json"
        required: false
        type: string

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write # required for npm OIDC provenance

jobs:
  release:
    name: Build, Test, Audit & Release
    runs-on: ubuntu-latest

    environment:
      name: npm-publish

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack (required for Yarn 4)
        run: corepack enable

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"
          registry-url: "https://registry.npmjs.org"

      - name: Print runtime versions
        run: |
          node --version
          npm --version
          yarn --version

      # 1. Resolve version
      - name: Resolve target version
        id: package
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Target version: $VERSION"

      # 2. Install & Build
      - name: Install dependencies
        run: yarn install --immutable

      - name: Build package
        run: yarn build

      # 3. Test — must pass before any publish step
      - name: Run tests
        run: yarn test

      # 4. Security audit
      - name: Run Shai-Hulud security audit
        shell: bash
        run: |
          chmod +x ./shai-hulud-audit.sh
          ./shai-hulud-audit.sh --no-color --save-report || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: shai-hulud-audit-${{ github.run_number }}
          path: "*.log"
          retention-days: 7

      # 5. Publish to npm (OIDC provenance)
      # --ignore-scripts prevents Husky / Yarn lifecycle hooks from interfering
      - name: Publish to npm
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # 6. Create GitHub Release
      - name: Create GitHub Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            --target "main"

      # 7. Publish to GitHub Packages (scoped name)
      - name: Publish to GitHub Packages
        if: success()
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm pkg set name="@aminekun90/mdns-listener-advanced"
          npm config set @aminekun90:registry=https://npm.pkg.github.com/
          npm config set //npm.pkg.github.com/:_authToken="${NODE_AUTH_TOKEN}"
          npm publish --registry https://npm.pkg.github.com/ --ignore-scripts
