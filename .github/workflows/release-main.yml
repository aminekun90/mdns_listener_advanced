name: Release & Publish

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 3.4.8) - Leave empty to use package.json'
        required: false
        type: string

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write # REQUIRED for OIDC

jobs:
  release:
    name: 🚀 Build, Audit & Release
    runs-on: ubuntu-latest
    
    # Matches your NPM settings "npm-publish" for OIDC
    environment:
      name: npm-publish

    steps:
      - name: ⬇️ Checkout Repo
        uses: actions/checkout@v6

      # REQUIRED for Yarn 4
      - name: Enable Corepack 
        run: corepack enable

      - name: ⚙️ Setup Node.js (Node 24)
        uses: actions/setup-node@v6
        with:
          # Utilise "24" pour avoir la dernière version stable de 2026
          node-version: "24" 
          cache: "yarn"
          registry-url: "https://registry.npmjs.org"

      - name: ⬆️ Check & Update npm if needed
        run: |
          CURRENT_NPM=$(npm -v)
          REQUIRED_NPM="11.12.1"
          
          if [ "$(printf '%s\n' "$REQUIRED_NPM" "$CURRENT_NPM" | sort -V | head -n1)" != "$REQUIRED_NPM" ]; then
            echo "Current npm ($CURRENT_NPM) is older than $REQUIRED_NPM. Updating..."
            corepack enable
            corepack prepare npm@$REQUIRED_NPM --activate
            # On force le rechargement pour que la suite du job voit le nouveau npm
            echo "NPM_CONFIG_USERCONFIG=$NPM_CONFIG_USERCONFIG" >> $GITHUB_ENV
            hash -r
          else
            echo "npm is up to date ($CURRENT_NPM)."
          fi
          echo "Final versions: Node $(node -v) / npm $(npm -v)"

      # 1. Determine Version
      - name: 🆔 Get Package Info
        id: package
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION=$(node -p "require('./package.json').version")
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "📦 Target Version: $VERSION"

      # 2. Install & Build
      - name: 🛠️ Install & Build
        run: |
          # Yarn 4 uses --immutable instead of --frozen-lockfile
          yarn install --immutable
          yarn build

      # 3. Security Audit (Shai-Hulud)
      - name: 🛡️ Run Shai-Hulud Audit
        shell: bash
        run: |
          chmod +x ./shai-hulud-audit.sh
          ./shai-hulud-audit.sh --no-color --save-report || true

      - name: 📤 Upload Audit Logs
        uses: actions/upload-artifact@v4
        with:
          name: shai-hulud-audit-${{ github.run_number }}
          path: "*.log"
          retention-days: 7

      # 4. Publish to Public NPM
      # --ignore-scripts: Prevents Husky/Yarn lifecycle scripts from interfering with npm publish
      # --provenance: Enables OIDC security
      - name: 🚀 Publish to NPM
        run: npm publish --provenance --access public --ignore-scripts

      # 5. Create GitHub Release
      - name: 🏷️ Create GitHub Release
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ steps.package.outputs.version }}
        run: |
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            --target "main"

      # 6. Publish to GitHub Packages
      - name: 📦 Publish to GitHub Packages
        if: success()
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm pkg set name="@aminekun90/mdns-listener-advanced"
          npm config set @aminekun90:registry=https://npm.pkg.github.com/
          npm config set //npm.pkg.github.com/:_authToken="${NODE_AUTH_TOKEN}"
          npm publish --registry https://npm.pkg.github.com/ --ignore-scripts