name: Test

on:
  push:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "SECURITY.md"
      - "changelog.md"
      - "LICENSE"
      - ".editorconfig"
    branches: [main, master]
  pull_request:
    paths-ignore:
      - "docs/**"
      - "README.md"
      - "SECURITY.md"
      - "changelog.md"
      - "LICENSE"
      - ".editorconfig"
    branches: [main, master]

permissions:
  contents: read

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22.x, 24.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Enable Corepack (required for Yarn 4)
        run: corepack enable

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: "yarn"

      - name: Install dependencies
        shell: bash
        run: yarn install --immutable

      - name: Build package
        shell: bash
        run: yarn build

      - name: Run tests with coverage
        shell: bash
        run: yarn test:cov

      # ── Security audit (Linux only) ────────────────────────────────────────
      - name: Set permissions on audit script
        if: matrix.os == 'ubuntu-latest'
        run: chmod +x ./shai-hulud-audit.sh

      - name: Shai-Hulud security audit
        if: matrix.os == 'ubuntu-latest'
        shell: bash
        run: ./shai-hulud-audit.sh --no-color --save-report
        continue-on-error: true

      - name: Upload security audit report
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: security-audit-${{ matrix.os }}-node${{ matrix.node }}-${{ github.run_number }}
          path: "*.log"
          retention-days: 7
