name: Manual Post-Release Sync

on:
  workflow_dispatch:

permissions:
  contents: write
  packages: write
  issues: write
  id-token: write

jobs:
  # Job 1: ensure the GitHub Release tag exists for the current package.json version
  ensure-release:
    name: Sync GitHub Release
    runs-on: ubuntu-latest
    outputs:
      target_tag: ${{ steps.get_version.outputs.TAG_NAME }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Enable Corepack (required for Yarn 4)
        run: corepack enable

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Read version from package.json
        id: get_version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          TAG_NAME="v$VERSION"
          echo "Detected version: $TAG_NAME"
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_OUTPUT

      - name: Create GitHub Release if missing
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.get_version.outputs.TAG_NAME }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists — skipping."
          else
            echo "Creating release $TAG..."
            gh release create "$TAG" \
              --title "$TAG" \
              --generate-notes \
              --target ${{ github.sha }}
          fi

  # Job 2: audit + publish to GitHub Packages
  audit-and-gh-package:
    name: Audit & Publish to GitHub Packages
    needs: ensure-release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.ensure-release.outputs.target_tag }}

      - name: Enable Corepack (required for Yarn 4)
        run: corepack enable

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "yarn"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: yarn install --immutable

      - name: Build package
        run: yarn build

      - name: Run tests
        run: yarn test

      - name: Run Shai-Hulud security audit
        shell: bash
        run: |
          chmod +x ./shai-hulud-audit.sh
          ./shai-hulud-audit.sh --no-color --save-report || true

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: shai-hulud-audit-${{ github.run_number }}
          path: "*.log"
          retention-days: 7

      - name: Publish to GitHub Packages
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          npm pkg set name="@aminekun90/mdns-listener-advanced"
          npm config set @aminekun90:registry=https://npm.pkg.github.com/
          npm config set //npm.pkg.github.com/:_authToken="${NODE_AUTH_TOKEN}"
          npm publish --registry https://npm.pkg.github.com/ --ignore-scripts
